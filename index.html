<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legal AI</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; text-align:center; }
textarea, select {
  width: 90%; padding:10px; margin:10px 0;
}
button {
  padding:10px 20px; margin:5px;
  background:black; color:white; border:none;
}
#output {
  background:white; padding:15px; margin-top:20px;
  text-align:left; white-space:pre-wrap;
}
.history {
  background:#fff; margin-top:20px; padding:10px; text-align:left;
}
</style>
</head>

<body>

<h1>Legal AI</h1>

<select id="docType">
  <option value="affidavit">Affidavit</option>
  <option value="statement">Legal Statement</option>
  <option value="complaint">Formal Complaint</option>
</select>

<textarea id="inputText" placeholder="Describe your situation..."></textarea>

<br>
<button onclick="generate()">Generate</button>
<button onclick="downloadPDF()">Download PDF</button>

<div id="output"></div>

<div class="history">
<h3>History</h3>
<ul id="historyList"></ul>
</div>

<script>
let lastOutput = "";

async function generate() {
  const input = document.getElementById("inputText").value;
  const type = document.getElementById("docType").value;

  const prompt = `Create a ${type} in proper Canadian legal format. Add disclaimer: This is not legal advice.\n\n${input}`;

  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer YOUR_API_KEY_HERE",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [{ role: "user", content: prompt }]
    })
  });

  const data = await response.json();
  const output = data.choices[0].message.content;

  lastOutput = output;
  document.getElementById("output").innerText = output;

  saveHistory(output);
}

function downloadPDF() {
  if (!lastOutput) return alert("Generate document first!");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const lines = doc.splitTextToSize(lastOutput, 180);
  doc.text(lines, 10, 10);

  doc.save("legal-document.pdf");
}

function saveHistory(text) {
  let history = JSON.parse(localStorage.getItem("history")) || [];
  history.unshift(text);
  localStorage.setItem("history", JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem("history")) || [];
  const list = document.getElementById("historyList");
  list.innerHTML = "";

  history.slice(0,5).forEach(item => {
    const li = document.createElement("li");
    li.innerText = item.substring(0,100) + "...";
    list.appendChild(li);
  });
}

renderHistory();
</script>

</body>
</html>
